name: Django CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      # instalar dependências com Pillow explícito
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install Pillow

      # verificar Pillow
      - name: Verify Pillow
        run: python -c "from PIL import Image; print('Pillow instalado com sucesso')"

      - name: Run migrations
        run: python manage.py migrate

      - name: Run tests
        run: python manage.py test
