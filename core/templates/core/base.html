<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Confeitaria{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    {% block extra_css %}{% endblock %}

    <style>
        /* ===============================
           BOTÃO DE ACESSIBILIDADE
        =============================== */
        #acessibilidade-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0d6efd;
            color: #fff;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        #acessibilidade-btn:hover {
            transform: scale(1.1);
        }

        #acessibilidade-menu {
            position: fixed;
            bottom: 90px;
            right: 20px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 9998;
            padding: 10px;
            width: 200px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }

        #acessibilidade-menu.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        /* ===============================
           MODO ALTO CONTRASTE
        =============================== */

        .alto-contraste {
            background-color: #000 !important;
            color: #fff !important;
        }

        .alto-contraste a {
            color: #0ff !important;
        }

        .alto-contraste nav.navbar {
            background-color: #000 !important;
            border-bottom: 1px solid #0ff !important;
        }

        .alto-contraste nav a,
        .alto-contraste .navbar-brand {
            color: #0ff !important;
        }

        .alto-contraste footer {
            background-color: #000 !important;
            color: #0ff !important;
            border-top: 1px solid #0ff;
        }

        .alto-contraste footer a {
            color: #0ff !important;
        }

        .alto-contraste .card,
        .alto-contraste .card-body {
            background-color: #000 !important;
            color: #fff !important;
            border: 1px solid #0ff !important;
        }

        .alto-contraste .btn {
            background-color: #0ff !important;
            color: #000 !important;
            border: none !important;
        }

        .alto-contraste .btn:hover {
            background-color: #fff !important;
            color: #000 !important;
        }

    </style>

</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">

        <!-- Logo -->
        <a class="navbar-brand" href="{% url 'home' %}">
            🍰 Confeitaria Silvia
        </a>

        <!-- Menu -->
        {% if user.is_authenticated %}
        <ul class="navbar-nav ms-auto d-flex flex-row align-items-center">

            <!-- BOTÃO HOME -->
            <li class="nav-item me-3">
                <a class="nav-link text-white" href="{% url 'home' %}">
                    <i class="bi bi-house-door-fill"></i> Home
                </a>
            </li>

            <!-- BOTÃO DASHBOARD -->
            <li class="nav-item me-3">
                <a class="nav-link text-white" href="{% url 'dashboard' %}">
                    <i class="bi bi-bar-chart-fill"></i> Dashboard
                </a>
            </li>

            <!-- ADMIN -->
            {% if is_admin %}
            <li class="nav-item me-3">
                <a class="nav-link text-white" href="{% url 'criar_usuario' %}">
                    <i class="bi bi-person-plus"></i> Usuários
                </a>
            </li>
            {% endif %}

            <!-- SAIR -->
            <li class="nav-item">
                <a class="nav-link text-white" href="{% url 'logout' %}">
                    <i class="bi bi-box-arrow-right"></i> Sair
                </a>
            </li>

        </ul>
        {% endif %}

    </div>
</nav>

<!-- CONTEÚDO -->
<main class="container my-4">

    {% block content %}

    {% endblock %}

</main>

<!-- FOOTER -->
<footer class="text-center py-3 bg-light mt-4 rounded">

    Confeitaria Silvia - Sistema de Gestão

</footer>

<!-- BOTÃO ACESSIBILIDADE -->

<div id="acessibilidade-btn">
    <i class="bi bi-universal-access"></i>
</div>

<div id="acessibilidade-menu">

    <button id="contraste-btn" class="btn btn-sm btn-dark w-100 mb-2">
        Alto Contraste
    </button>

    <button id="fonte-btn" class="btn btn-sm btn-secondary w-100 mb-2">
        Aumentar Fonte
    </button>

    <button id="fonte-dim-btn" class="btn btn-sm btn-secondary w-100">
        Diminuir Fonte
    </button>

</div>

<script>

const btn = document.getElementById('acessibilidade-btn');
const menu = document.getElementById('acessibilidade-menu');

btn.onclick = () => {
    menu.classList.toggle('show');
};

document.getElementById('contraste-btn').onclick = () => {
    document.body.classList.toggle('alto-contraste');
};

document.getElementById('fonte-btn').onclick = () => {
    let size = parseInt(window.getComputedStyle(document.body).fontSize);
    document.body.style.fontSize = (size + 2) + 'px';
};

document.getElementById('fonte-dim-btn').onclick = () => {
    let size = parseInt(window.getComputedStyle(document.body).fontSize);
    document.body.style.fontSize = (size - 2) + 'px';
};

</script>

</body>
</html>
