{% extends "core/base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<div class="container">

    <!-- Cabeçalho -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2>
            <i class="bi bi-speedometer2"></i>
            Dashboard Administrativo
        </h2>

        <div>

            <a href="{% url 'relatorio_pdf' %}"
               class="btn btn-danger me-2"
               target="_blank">

               <i class="bi bi-file-earmark-pdf"></i>
               Gerar Relatório PDF

            </a>

            <a href="{% url 'home' %}" class="btn btn-secondary">
                <i class="bi bi-house"></i>
                Home
            </a>

        </div>

    </div>


    <div class="row">

        <!-- Produtos -->
        <div class="col-md-4">
            <div class="card shadow mb-4">
                <div class="card-body">

                    <h5>
                        <i class="bi bi-box"></i>
                        Produtos
                    </h5>

                    <canvas id="graficoProdutos"></canvas>

                </div>
            </div>
        </div>


        <!-- Insumos -->
        <div class="col-md-4">
            <div class="card shadow mb-4">
                <div class="card-body">

                    <h5>
                        <i class="bi bi-tools"></i>
                        Insumos
                    </h5>

                    <canvas id="graficoInsumos"></canvas>

                </div>
            </div>
        </div>


        <!-- Colaboradores -->
        <div class="col-md-4">
            <div class="card shadow mb-4">
                <div class="card-body">

                    <h5>
                        <i class="bi bi-people"></i>
                        Colaboradores
                    </h5>

                    <canvas id="graficoColaboradores"></canvas>

                </div>
            </div>
        </div>

    </div>

</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

/// PRODUTOS
fetch('/api/produtos/')
.then(res => res.json())
.then(data => {

    const nomes = data.map(item => item.nome);

    new Chart(document.getElementById('graficoProdutos'), {
        type: 'bar',
        data: {
            labels: nomes,
            datasets: [{
                label: 'Produtos',
                data: nomes.map(() => 1)
            }]
        }
    });

});


/// INSUMOS
fetch('/api/insumos/')
.then(res => res.json())
.then(data => {

    const nomes = data.map(item => item.nome);

    new Chart(document.getElementById('graficoInsumos'), {
        type: 'bar',
        data: {
            labels: nomes,
            datasets: [{
                label: 'Insumos',
                data: nomes.map(() => 1)
            }]
        }
    });

});


/// COLABORADORES POR FUNÇÃO
fetch('/api/colaboradores/')
.then(res => res.json())
.then(data => {

    const funcoes = {};

    data.forEach(colab => {

        const funcao = colab.funcao || "Sem função";

        if (funcoes[funcao]) {
            funcoes[funcao]++;
        } else {
            funcoes[funcao] = 1;
        }

    });

    const labels = Object.keys(funcoes);
    const valores = Object.values(funcoes);

    new Chart(document.getElementById('graficoColaboradores'), {

        type: 'bar',

        data: {

            labels: labels,

            datasets: [{
                label: 'Colaboradores por função',
                data: valores
            }]

        },

        options: {
            responsive: true,
            plugins: {
                legend: {
                    display: true
                }
            }
        }

    });

});

</script>

{% endblock %}
